server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: project-admin
  profiles:
    active: standalone
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:172.30.35.44}:${DB_PORT:5432}/${DB_NAME:feice}
    username: ${DB_USERNAME:feice}
    password: ${DB_PASSWORD:feice123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000
  data:
    redis:
      host: ${REDIS_HOST:172.29.247.150}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:DF^oY9vt#J}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.core.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example: INFO
    org.springframework: WARN
